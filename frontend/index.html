<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HidroRec - Dashboard</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
</head>
<body>
  <h1>HidroRec</h1>
  <div id="status"></div>
  <script>
    fetch('/api/status')
      .then(res => res.json())
      .then(data => {
        document.getElementById('status').innerText = 'API Status: ' + data.status;
      })
      .catch(err => {
        document.getElementById('status').innerText = 'Erro ao conectar com a API';
      });
  </script>
</body>
</html>
